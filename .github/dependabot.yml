version: 2
updates:
  # NuGet package versions are pinned centrally in Directory.Packages.props.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      nuget:
        patterns:
          - "*"
  # Keep the GitHub Actions used in CI/CodeQL/release up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
