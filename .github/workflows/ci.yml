name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Cobalt.slnx
      - name: Build
        run: dotnet build Cobalt.slnx --no-restore --configuration Release -p:ContinuousIntegrationBuild=true
      - name: Test
        run: dotnet test Cobalt.slnx --no-build --configuration Release
      - name: Pack (smoke)
        run: dotnet pack src/Cobalt --no-build --configuration Release -o nupkg
